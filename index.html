<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Job Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .badge-remote  { background:#dcfce7; color:#166534; }
    .badge-hybrid  { background:#fef9c3; color:#854d0e; }
    .badge-onsite  { background:#fee2e2; color:#991b1b; }
    .badge-unknown { background:#f1f5f9; color:#475569; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold">Remote Job Board</h1>
        <p class="text-sm text-gray-500 mt-0.5">Jobs scraped from top company career pages</p>
      </div>
      <a href="https://github.com/zacharybk/remote-cx-job-sources"
         target="_blank"
         class="text-sm text-gray-500 hover:text-gray-900 underline">
        View sources on GitHub
      </a>
    </div>
  </header>

  <!-- Controls -->
  <div class="max-w-6xl mx-auto px-6 py-4">
    <div class="flex flex-col sm:flex-row gap-3">
      <input
        id="search"
        type="text"
        placeholder="Search by title or company..."
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <div class="flex gap-2">
        <button data-filter="all"    class="filter-btn active px-3 py-2 rounded-lg text-sm font-medium border">All</button>
        <button data-filter="remote" class="filter-btn px-3 py-2 rounded-lg text-sm font-medium border">Remote</button>
        <button data-filter="hybrid" class="filter-btn px-3 py-2 rounded-lg text-sm font-medium border">Hybrid</button>
        <button data-filter="onsite" class="filter-btn px-3 py-2 rounded-lg text-sm font-medium border">On-site</button>
      </div>
    </div>
    <p id="job-count" class="text-sm text-gray-500 mt-2"></p>
  </div>

  <!-- Table -->
  <div class="max-w-6xl mx-auto px-6 pb-12">
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Title</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Company</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Location</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Type</th>
              <th class="text-left px-4 py-3 font-medium text-gray-600">Added</th>
            </tr>
          </thead>
          <tbody id="jobs-table">
            <tr>
              <td colspan="5" class="px-4 py-8 text-center text-gray-400">Loading jobs...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Load more -->
    <div class="mt-4 text-center">
      <button id="load-more" class="hidden px-6 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">
        Load more
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://lyaxzyjqvfwphcmmmibt.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5YXh6eWpxdmZ3cGhjbW1taWJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjM1NzIsImV4cCI6MjA4ODI5OTU3Mn0.6lJUy2aAwnzl5JJRxGLJYgZ7B0nVqiNeaEwJ0xNmRpw';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON);

    const PAGE_SIZE = 50;
    let currentPage = 0;
    let activeFilter = 'all';
    let searchQuery = '';
    let allJobs = [];
    let displayedJobs = [];

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function workTypeBadge(type) {
      const cls = `badge-${type || 'unknown'}`;
      const label = (type || 'unknown').charAt(0).toUpperCase() + (type || 'unknown').slice(1);
      return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${cls}">${label}</span>`;
    }

    function renderRows(jobs) {
      const tbody = document.getElementById('jobs-table');
      if (!jobs.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No jobs found</td></tr>`;
        return;
      }
      tbody.innerHTML = jobs.map(j => `
        <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
          <td class="px-4 py-3">
            <a href="${j.url}" target="_blank"
               class="font-medium text-blue-600 hover:underline leading-snug">
              ${j.title}
            </a>
          </td>
          <td class="px-4 py-3 text-gray-700">${j.company}</td>
          <td class="px-4 py-3 text-gray-500 text-xs">${j.location || '—'}</td>
          <td class="px-4 py-3">${workTypeBadge(j.work_type)}</td>
          <td class="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">${formatDate(j.date_added)}</td>
        </tr>
      `).join('');
    }

    function applyFiltersAndSearch() {
      let filtered = allJobs;

      if (activeFilter !== 'all') {
        filtered = filtered.filter(j => j.work_type === activeFilter);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(j =>
          j.title.toLowerCase().includes(q) ||
          j.company.toLowerCase().includes(q)
        );
      }

      displayedJobs = filtered;
      const shown = filtered.slice(0, (currentPage + 1) * PAGE_SIZE);
      renderRows(shown);

      document.getElementById('job-count').textContent =
        `Showing ${Math.min(shown.length, filtered.length)} of ${filtered.length} jobs`;

      const loadMore = document.getElementById('load-more');
      if (filtered.length > shown.length) {
        loadMore.classList.remove('hidden');
      } else {
        loadMore.classList.add('hidden');
      }
    }

    async function fetchJobs() {
      const { data, error } = await db
        .from('jobs')
        .select('title, company, location, url, work_type, date_added')
        .eq('is_active', true)
        .eq('is_duplicate', false)
        .order('date_added', { ascending: false })
        .limit(2000);

      if (error) {
        document.getElementById('jobs-table').innerHTML =
          `<tr><td colspan="5" class="px-4 py-8 text-center text-red-400">Error loading jobs: ${error.message}</td></tr>`;
        return;
      }

      allJobs = data || [];
      applyFiltersAndSearch();
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active', 'bg-gray-900', 'text-white', 'border-gray-900');
          b.classList.add('text-gray-600', 'border-gray-300', 'bg-white');
        });
        btn.classList.add('active', 'bg-gray-900', 'text-white', 'border-gray-900');
        btn.classList.remove('text-gray-600', 'border-gray-300', 'bg-white');
        activeFilter = btn.dataset.filter;
        currentPage = 0;
        applyFiltersAndSearch();
      });
    });

    // Set initial active button style
    document.querySelector('[data-filter="all"]').classList.add('bg-gray-900', 'text-white', 'border-gray-900');

    // Search
    let searchTimer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        searchQuery = e.target.value.trim();
        currentPage = 0;
        applyFiltersAndSearch();
      }, 200);
    });

    // Load more
    document.getElementById('load-more').addEventListener('click', () => {
      currentPage++;
      applyFiltersAndSearch();
    });

    fetchJobs();
  </script>
</body>
</html>
